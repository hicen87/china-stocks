<script>
(function(){
  var d = window.STOCK_TABLE_DATA || {rows:[]};
  function col(v){ return v>=8.5?'var(--hot)':v>=6.5?'var(--warm)':v>=4?'var(--neu)':'var(--cool)'; }
  document.getElementById('title').textContent = (d.title||'');
  document.getElementById('sub').textContent = '数据时点 ' + (d.asOf||'');
  document.getElementById('legend').textContent = d.ruleNote||'';
  var rows = (d.rows||[]).map(function(r){
    return '<tr class="'+(r.tier||'')+'">'
      + '<td class="rank" data-label="潜力">'+r.rank+'</td>'
      + '<td class="segcell" data-label="环节"><div class="seg">'+r.segment+' <span style="font-weight:400;color:var(--mut);font-size:13px">['+(r.vtype||'')+']</span></div><div class="leaders ev" style="white-space:normal">'+(r.evidence||'')+'</div></td>'
      + '<td class="num" data-label="紧缺" style="color:'+col(r.scarcity)+'">'+r.scarcity+'</td>'
      + '<td class="num" data-label="利润池" style="color:'+col(r.pool)+'">'+r.pool+'</td>'
      + '<td class="num" data-label="扩产难度" style="color:'+col(r.expand)+'">'+r.expand+'</td>'
      + '<td class="num" data-label="定价权" style="color:'+col(r.pricing)+'">'+r.pricing+'</td>'
      + '<td data-label="状态">'+r.status+'</td>'
      + '<td data-label="边际">'+r.marginal+'</td>'
      + '<td class="leaders" data-label="龙头">'+r.leaders+'</td>'
      + '<td data-label="估值双锚"><div>'+r.fpe+'</div><div class="leaders" style="white-space:normal">'+(r.anchor2||'')+'</div></td>'
      + '<td data-label="定价">'+r.priced+'</td>'
      + '<td class="verdict" data-label="结论">'+r.verdict+'</td>'
      + '<td data-label="仓位档" style="font-weight:600;white-space:nowrap">'+(r.sizeBand||'—')+'</td>'
      + '</tr>';
  }).join('');
  document.getElementById('rows').innerHTML = rows;
  document.getElementById('anchors').innerHTML = (d.scoreAnchors||[]).map(function(s){return '<li>'+s+'</li>';}).join('');
  document.getElementById('prules').innerHTML = (d.portfolioRules||[]).map(function(s){return '<li>'+s+'</li>';}).join('');
  document.getElementById('tiers').innerHTML = (d.tiers||[]).map(function(s){return '<li>'+s+'</li>';}).join('');
  document.getElementById('falsifiers').innerHTML = (d.falsifiers||[]).map(function(s){return '<li>'+s+'</li>';}).join('');
  document.getElementById('foot').textContent = (d.version? d.version+' · ':'') + (d.dataNote||'') + ' ' + (d.disclaimer||'');

  var btn = document.getElementById('saveImg');
  function loadH2C(){
    return new Promise(function(res,rej){
      if(typeof html2canvas!=='undefined') return res();
      var s=document.createElement('script'); s.src='html2canvas.min.js';
      s.onload=res; s.onerror=function(){rej(new Error('截图组件加载失败'));};
      document.head.appendChild(s);
    });
  }
  btn.addEventListener('click', function(){
    var wrap = document.querySelector('.wrap');
    var label = btn.textContent;
    btn.disabled = true; btn.textContent = '生成中…';
    var bg = getComputedStyle(document.body).backgroundColor;
    loadH2C().then(function(){
    return html2canvas(wrap, {backgroundColor:bg, scale:2, useCORS:true, ignoreElements:function(el){return el.id==='saveImg';}})
      .then(function(canvas){
        canvas.toBlob(function(blob){
          var name = 'AI产业链选股表_'+(d.asOf||'')+'.png';
          var file; try{ file = new File([blob], name, {type:'image/png'}); }catch(e){}
          if(file && navigator.canShare && navigator.canShare({files:[file]})){
            navigator.share({files:[file]}).catch(function(){});
          } else {
            var a = document.createElement('a');
            a.download = name; a.href = URL.createObjectURL(blob); a.click();
          }
          btn.disabled = false; btn.textContent = label;
        }, 'image/png');
      });
    })
      .catch(function(e){ alert('生成失败：'+e); btn.disabled=false; btn.textContent=label; });
  });
})();
</script>
